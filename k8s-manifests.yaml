---
# Redis Deployment with hostPath for Baremetal Persistence
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeName: node1 # Pin to node1 to ensure hostPath data is always found
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          hostPath:
            path: /opt/redis-data
            type: DirectoryOrCreate

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---
# Backend API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  labels:
    app: portfolio-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: portfolio-backend
  template:
    metadata:
      labels:
        app: portfolio-backend
    spec:
      hostNetwork: true
      nodeName: node1
      containers:
        - name: backend
          image: docker.io/phib256/portfolio-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 808000
          env:
            - name: REDIS_HOST
              value: "redis-service"

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: portfolio-backend
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: portfolio-backend

---
# Frontend Deployment (No PVC, served directly from the Docker Image)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-website
  labels:
    app: portfolio-website
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: portfolio-website
  template:
    metadata:
      labels:
        app: portfolio-website
    spec:
      hostNetwork: true
      nodeName: node1
      containers:
        - name: nginx
          image: docker.io/phib256/portfolio-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: portfolio-website-svc
  labels:
    app: portfolio-website
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: portfolio-website
