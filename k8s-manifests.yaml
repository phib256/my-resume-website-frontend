---
# PersistentVolumeClaim for Frontend Assets (Optional, kept for legacy compatibility)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portfolio-webroot-pvc
  labels:
    app: portfolio-website
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# PersistentVolumeClaim for Redis Database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  labels:
    app: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---
# Backend API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  labels:
    app: portfolio-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-backend
  template:
    metadata:
      labels:
        app: portfolio-backend
    spec:
      containers:
        - name: backend
          image: phib256/portfolio-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: "redis-service"

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: portfolio-backend
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: portfolio-backend

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-website
  labels:
    app: portfolio-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-website
  template:
    metadata:
      labels:
        app: portfolio-website
    spec:
      initContainers:
        - name: populate-pvc
          image: phib256/portfolio-website:latest
          imagePullPolicy: Always
          command: ['sh', '-c', 'cp -r /usr/share/nginx/html/* /mnt/webroot/ || true']
          volumeMounts:
            - name: webroot-volume
              mountPath: /mnt/webroot
      containers:
        - name: nginx
          image: phib256/portfolio-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: webroot-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: webroot-volume
          persistentVolumeClaim:
            claimName: portfolio-webroot-pvc

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: portfolio-website-svc
  labels:
    app: portfolio-website
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: portfolio-website
